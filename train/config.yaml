# ─────────────────────────────────────────────────────────────────────────────
# LongCat-AudioDiT fine-tuning config
# ─────────────────────────────────────────────────────────────────────────────

model:
  model_dir: "meituan-longcat/LongCat-AudioDiT-1B"
  dtype: "bfloat16"      # float32 | bfloat16

data:
  hf_split: "train"
  shard_frac: 1.0              # 使用全量 shard；调试时可设 0.01
  wer_max: 0.3                 # 过滤转录质量差的样本（WER > 0.3 丢弃）
  sample_rate: 24000
  max_text_len: 512

  # ─── 音频长度过滤 ────────────────────────────────────────────────────────────
  min_audio_sec: 4.0           # 太短无法切出 prompt 区 + min_gen 区
  max_audio_sec: 20.0          # 超过的截断

  # ─── prompt/gen 切分 ────────────────────────────────────────────────────────
  # 按比例切（frac_lo ~ frac_hi 内均匀采样），再被 prompt_min/max_sec 和 min_gen_sec
  # 约束；最终向下对齐到 full_hop (2048 采样点 = 1 latent 帧)。
  prompt_min_sec: 1.0          # prompt 绝对下限（声纹参考最少长度）
  prompt_max_sec: 10          # prompt 绝对上限
  min_gen_sec:    1.5          # gen 区绝对下限（避免单 batch gen 帧数太少导致 MSE 方差大）
  prompt_frac_lo: 0.2         # prompt 占音频比例下限
  prompt_frac_hi: 0.7         # prompt 占音频比例上限

  # ─── 样本质量过滤 ────────────────────────────────────────────────────────────
  clip_peak_threshold: 0.99    # peak ≥ 此阈值视为数字削波，丢弃（见 docs/clipping_filter.md）
  min_text_tokens: 8           # 去空格后字符数 < 此值的样本丢弃（异常短文本）

training:
  # resume_from: "./checkpoint/step_0000000"
  resume_from: null
  steps: 10000
  batch_size: 16
  gradient_accumulation: 1
  learning_rate: 1.0e-4
  warmup_steps: 500
  max_grad_norm: 1.0
  save_every: 1000
  log_every: 100
  num_workers: 16
  seed: 42
  output_dir: "./checkpoint"

# ─── LoRA 全局超参 ────────────────────────────────────────────────────────────
lora:
  r: 32
  alpha: 32        # scale = alpha / r，建议与 r 相等
  dropout: 0.05

# ─── 可训练组件 ───────────────────────────────────────────────────────────────
# mode: frozen — 冻结，不参与训练
#        full   — 全量更新
#        lora   — LoRA 低秩更新（使用上方 lora 全局超参）
#
# 组件说明（参数量基于 1B 配置 dim=1536, depth=24）：
#   dit_attn        self_attn + cross_attn 的 Q/K/V/O 投影，~600M，建议 lora
#   dit_ffn          FFN up/down linear，~340M，lora 略好于 frozen，参数翻倍
#   dit_adaln       AdaLN 调制 MLP，~50M，参数小可直接 full
#   text_conv       ConvNeXt v2 文本局部卷积，~9M，参数小可直接 full
#   latent_embed         参考音频 clean latent 投影，~9M
#   latent_cond_embedder noisy+clean concat 后融合投影（3072→1536），~18M
#   input_embed          noisy latent 输入嵌入（64→1536），~5M
#   output_proj     norm_out.linear + proj_out 输出头，~9M
#   time_embed      时间步嵌入 MLP，~2M
#   text_encoder    文本编码器（T5 等），适合跨域文本适配，支持 lora
#   vae             音频 VAE，改变 latent 空间会破坏 DiT 对齐，谨慎开启
# ─────────────────────────────────────────────────────────────────────────────
components:
  dit_attn:
    mode: lora

  dit_ffn:
    mode: lora

  dit_adaln:
    mode: full

  text_conv:
    mode: full

  latent_embed:
    mode: full

  latent_cond_embedder:
    mode: full

  input_embed:
    mode: full

  output_proj:
    mode: full

  time_embed:
    mode: full

  # 文本编码器：通常冻结；跨域适配时可改 lora
  text_encoder:
    mode: frozen

  # VAE：改变 latent 空间会破坏 DiT 对齐，需与 DiT 同步训练，默认冻结
  vae:
    mode: frozen

# ─── 推理评估（每 save_every 步自动运行）────────────────────────────────────────
eval:
  samples_dir: "/workspace/LongCat-AudioDiT/audios"   # 递归搜索 *.wav 作为 prompt
  gen_text: "A gentle breeze blew across the open field as the sun began to set in the west."
  nfe: 16
  cfg_strength: 4.0
  guidance_method: "cfg"
  whisper_model: "base"   # Whisper 型号，用于 prompt 转录 + WER 计算

# ─── accelerate 启动参数 ──────────────────────────────────────────────────────
# 仅作记录，实际由 accelerate launch --num_processes 读取
# mixed_precision 由上方 model.dtype 决定，train.py 自动转换
accelerate:
  num_processes: 4   # 使用的 GPU 数量
